services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gpu
      POSTGRES_PASSWORD: gpu
      POSTGRES_DB: gpuindex
    ports:
      - "5433:5432"
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpu -d gpuindex"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://gpu:gpu@postgres:5432/gpuindex
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: local
      API_KEYS: local-dev-key
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
